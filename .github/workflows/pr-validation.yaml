name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install Dependencies
        run: npm install htmlhint stylelint

      - name: Lint HTML
        run: npx htmlhint src/**/*.html

      - name: Lint CSS
        run: npx stylelint styles/**/*.css

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install Parcel
        run: npm install parcel

      - name: Build Website
        run: npx parcel build src/index.html
